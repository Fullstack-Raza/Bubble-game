<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="panel">
        <div class="ptop">
          <div class="elem">
            <h2>Hit</h2>
            <div  class="box" id="hit"></div>
          </div>
          <div class="elem" >
            <h2>Timer</h2>
            <div class="box" id="time"></div>
          </div>
          <div class="elem">
            <h2>Score</h2>
            <div id="score" class="box"></div>
          </div>
        </div>
        <div class="pbtm">
            <!-- <div class="bubble">5</div> -->
            
        </div>
      </div>
      <div class="result">
        <h2>Game over</h2>
        <h2>your score is <span id="fscore"></span></h2>
        <button id="restart">Play Again</button>
      </div>
    </main>
    <script src="js.js"></script>
  </body>
</html>
